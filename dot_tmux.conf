# TMux Config for Claude Code Development

# Set prefix to semicolon
unbind C-b
set-option -g prefix \;
bind-key \; send-prefix

# Enable mouse support
set-option -g mouse on

# Toggle a single persistent terminal window with prefix+t
bind-key t if-shell "tmux list-windows -F '#{window_name}' | grep -q '^terminal$'" \
  "if-shell \"[ \\\"$(tmux display-message -p '#{window_name}')\\\" = 'terminal' ]\" \
    'last-window' \
    'select-window -t terminal'" \
  "new-window -n terminal"

# Additional useful settings for development
set-option -g default-terminal "screen-256color"
set-option -g history-limit 10000

# Vim-style pane navigation with hjkl
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Vim-style pane resizing
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# Window navigation with vim keys
bind-key n next-window
bind-key p previous-window

# Vim copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
