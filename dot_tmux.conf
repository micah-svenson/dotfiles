# TMux Config for Claude Code Development

# Set prefix to semicolon (home row, no modifier needed)
unbind C-b
set-option -g prefix \;
bind-key \; send-prefix

# Enable mouse support
set-option -g mouse on

# True color and 256-color support
set-option -g default-terminal "tmux-256color"
set-option -ag terminal-overrides ",xterm-256color:RGB"

# Pass terminal title through to Windows Terminal tab
set-option -g set-titles on
set-option -g set-titles-string "[#{session_name}] #{pane_title}"

set-option -g history-limit 10000

# Bell detection — highlight windows that need attention
set-option -g monitor-bell on
set-option -g bell-action other
set-option -g visual-bell off

# Vim copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Lazygit popup overlay (prefix + g)
bind-key g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"

# Neovim popup overlay (prefix + v)
bind-key v display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "nvim ."

# Scratch nvim buffer for quick notes / Claude input (prefix + e)
bind-key e display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "nvim /tmp/claude-scratch.md"

# Toggle a single persistent terminal window (prefix + t)
# Creates a "terminal" window if it doesn't exist, then toggles between it and last window
bind-key t if-shell "tmux list-windows -F '##{window_name}' | grep -q '^terminal$'" \
  "if-shell \"[ \\\"$(tmux display-message -p '#{window_name}')\\\" = 'terminal' ]\" \
    'last-window' \
    'select-window -t terminal'" \
  "new-window -n terminal"

# IDE-like bottom terminal toggle (prefix + /)
bind-key / run-shell "~/.local/bin/tmux-toggle-term"

# Fuzzy session picker/creator: pick existing or type a name (prefix + f)
bind-key f display-popup -E -w 60% -h 60% "~/.local/bin/tmux-sessionizer"

# Vim-style pane navigation (prefix + h/j/k/l)
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Vim-style pane resizing
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# Window navigation
bind-key n next-window
bind-key p previous-window

# Switch to last session (prefix + Shift+L handled by resize above, use prefix + S instead)
# Note: prefix+L conflicts with pane resize-right above.
# Using last-window as alternative:
bind-key Space switch-client -l

# ===== Status Bar Configuration =====
# Dracula color palette for tmux
set-option -g status-style "bg=#282a36,fg=#f8f8f2"

# Status line left: session name in bold cyan
set-option -g status-left "#[fg=#8be9fd,bold] [#S] #[default]"
set-option -g status-left-length 20

# Window formatting
# Active window: diamond symbols + bold purple background
set-option -g window-status-current-format "#[fg=#282a36,bg=#bd93f9,bold] ◆ #W ◆ #[default]"
# Inactive windows: dim gray text
set-option -g window-status-format "#[fg=#6272a4] #W #[default]"
# Window separator
set-option -g window-status-separator " | "

# Status right: directory | time
set-option -g status-right "#[fg=#50fa7b] ⎇ #{pane_current_path} #[default] | #[fg=#f1fa8c]%H:%M#[default]"
set-option -g status-right-length 80
